<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Past Challenge</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 50px; }
        .game-container { background: #16213e; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: inline-block; }
        h1 { color: #0f3460; background: #e94560; display: inline-block; padding: 10px 20px; border-radius: 10px; }
        .sentence { font-size: 24px; margin: 30px 0; font-weight: bold; }
        .options { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .option { background: #0f3460; border: 2px solid #e94560; padding: 15px 30px; border-radius: 50px; cursor: pointer; transition: 0.3s; font-size: 18px; }
        .option:hover { background: #e94560; transform: translateY(-5px); }
        .feedback { margin-top: 20px; font-size: 20px; font-weight: bold; min-height: 30px; }
    </style>
</head>
<body>

    <h1>SIMPLE PAST SLIDER</h1>
    <div class="game-container">
        <p>¡Desliza la opción correcta!</p>
        <div class="sentence" id="challengeText">RETO 1: Yesterday, Carlos and his family [ _________ ] a delicious dinner together.</div>
        
        <div class="options">
            <div class="option" onclick="checkAnswer('A')">[ Opción A: Cook ]</div>
            <div class="option" onclick="checkAnswer('B')">[ Opción B: Cooked ]</div>
            <div class="option" onclick="checkAnswer('C')">[ Opción C: Cooking ]</div>
        </div>

        <div class="feedback" id="feedbackText"></div>
    </div>

    <script>
        function checkAnswer(choice) {
            const feedback = document.getElementById('feedbackText');
            if (choice === 'B') {
                feedback.innerHTML = "✅ ¡EXCELENTE! Usamos 'Cooked' porque en afirmativo agregamos -ED.";
                feedback.style.color = "#4eff61";
            } else {
                feedback.innerHTML = "❌ ¡Cerca! Recuerda que en pasado afirmativo el verbo debe cambiar.";
                feedback.style.color = "#ff4e4e";
            }
        }
    </script>
</body>
</html>
